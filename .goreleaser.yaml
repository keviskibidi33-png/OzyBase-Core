version: 2

project_name: ozybase

before:
  hooks:
    - go mod download

builds:
  - id: ozybase
    main: ./cmd/ozybase
    binary: ozybase
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/Xangel0s/OzyBase/internal/version.Version={{.Version}} -X github.com/Xangel0s/OzyBase/internal/version.Commit={{.Commit}} -X github.com/Xangel0s/OzyBase/internal/version.Date={{.Date}} -X github.com/Xangel0s/OzyBase/internal/version.BuiltBy=goreleaser

archives:
  - id: binaries
    ids:
      - ozybase
    name_template: "ozybase_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
