services:
  ozybase:
    image: ${OZYBASE_IMAGE:-ozybase:local}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ozybase
    restart: unless-stopped
    ports:
      - "${PORT:-8090}:8090"
    environment:
      DB_USER: ${DB_USER:-ozybase}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
      DB_NAME: ${DB_NAME:-ozybase}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      DATABASE_URL: postgres://${DB_USER:-ozybase}:${DB_PASSWORD:?set DB_PASSWORD}@db:5432/${DB_NAME:-ozybase}?sslmode=${DB_SSLMODE:-disable}
      DB_POOLER_URL: ${DB_POOLER_URL:-}
      OZY_DEPLOYMENT_PROFILE: ${OZY_DEPLOYMENT_PROFILE:-install_to_play}
      PORT: "8090"
      JWT_SECRET: ${JWT_SECRET:-}
      SITE_URL: ${SITE_URL:?set SITE_URL}
      APP_DOMAIN: ${APP_DOMAIN:?set APP_DOMAIN}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      DEBUG: ${DEBUG:-false}
      OZY_STRICT_SECURITY: ${OZY_STRICT_SECURITY:-false}
      ANON_KEY: ${ANON_KEY:-}
      SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY:-}
      ANON_KEY_PREVIOUS: ${ANON_KEY_PREVIOUS:-}
      SERVICE_ROLE_KEY_PREVIOUS: ${SERVICE_ROLE_KEY_PREVIOUS:-}
      STATIC_KEY_GRACE_UNTIL: ${STATIC_KEY_GRACE_UNTIL:-}
      API_KEY_ROTATION_GRACE_MINUTES: ${API_KEY_ROTATION_GRACE_MINUTES:-15}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-}
      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS:-20}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-20}
      OZY_SQL_EDITOR_MAX_ROWS: ${OZY_SQL_EDITOR_MAX_ROWS:-1000}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      OZY_STORAGE_PROVIDER: ${OZY_STORAGE_PROVIDER:-local}
      OZY_STORAGE_FALLBACK_LOCAL: ${OZY_STORAGE_FALLBACK_LOCAL:-true}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_USE_SSL: ${S3_USE_SSL:-false}
      OZY_REALTIME_BROKER: ${OZY_REALTIME_BROKER:-local}
      REDIS_ADDR: ${REDIS_ADDR:-}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      OZY_REALTIME_CHANNEL: ${OZY_REALTIME_CHANNEL:-ozy_events_cluster}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8090/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - ozy_data:/app/data
      - ozy_migrations:/app/migrations
      - ozy_functions:/app/functions

  db:
    image: postgres:15-alpine
    container_name: ozybase-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-ozybase}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-ozybase}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ozybase} -d ${DB_NAME:-ozybase}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ozy_data:
  ozy_migrations:
  ozy_functions:
  postgres_data:
