services:
  ozybase:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ozybase
    restart: unless-stopped
    ports:
      - "${PORT:-8090}:8090"
    environment:
      DATABASE_URL: postgres://${DB_USER:?set DB_USER}:${DB_PASSWORD:?set DB_PASSWORD}@db:5432/${DB_NAME:?set DB_NAME}?sslmode=${DB_SSLMODE:-verify-full}
      PORT: "8090"
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      ANON_KEY: ${ANON_KEY:-}
      SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY:-}
      ANON_KEY_PREVIOUS: ${ANON_KEY_PREVIOUS:-}
      SERVICE_ROLE_KEY_PREVIOUS: ${SERVICE_ROLE_KEY_PREVIOUS:-}
      STATIC_KEY_GRACE_UNTIL: ${STATIC_KEY_GRACE_UNTIL:-}
      API_KEY_ROTATION_GRACE_MINUTES: ${API_KEY_ROTATION_GRACE_MINUTES:-15}
      SITE_URL: ${SITE_URL:?set SITE_URL}
      APP_DOMAIN: ${APP_DOMAIN:?set APP_DOMAIN}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?set ALLOWED_ORIGINS}
      DEBUG: ${DEBUG:-false}
      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS:-20}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-20}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8090/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - ozy_data:/app/data
      - ./migrations:/app/migrations
      - ./functions:/app/functions
    networks:
      - ozy_network

  db:
    image: postgres:15-alpine
    container_name: ozybase-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:?set DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:?set DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${DB_USER:?set DB_USER} -d ${DB_NAME:?set DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ozy_network

volumes:
  ozy_data:
  postgres_data:

networks:
  ozy_network:
    driver: bridge
