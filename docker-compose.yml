version: "3.8"

services:
  ozybase:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ozybase
    ports:
      - "${PORT:-8090}:8090"
    environment:
      - DATABASE_URL=postgres://${DB_USER:-ozyuser}:${DB_PASSWORD:-ozypassword123}@db:5432/${DB_NAME:-Ozydb}?sslmode=disable
      - PORT=8090
      - JWT_SECRET=${JWT_SECRET}
      - SITE_URL=${SITE_URL:-http://localhost:8090}
      - APP_DOMAIN=${APP_DOMAIN:-localhost}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5342,http://localhost:3000}
      - DEBUG=${DEBUG:-false}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ozy_data:/app/data
      - ./migrations:/app/migrations
      - ./functions:/app/functions
    networks:
      - ozy_network

  db:
    image: postgres:15-alpine
    container_name: ozybase-db
    environment:
      - POSTGRES_USER=${DB_USER:-ozyuser}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-ozypassword123}
      - POSTGRES_DB=${DB_NAME:-Ozydb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${DB_USER:-ozyuser} -d ${DB_NAME:-Ozydb}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ozy_network

volumes:
  ozy_data:
  postgres_data:

networks:
  ozy_network:
    driver: bridge
