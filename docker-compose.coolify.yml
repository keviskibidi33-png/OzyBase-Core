services:
  ozybase:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ozybase
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      PORT: "8090"
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      SITE_URL: ${SITE_URL:?set SITE_URL}
      APP_DOMAIN: ${APP_DOMAIN:?set APP_DOMAIN}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?set ALLOWED_ORIGINS}
      DEBUG: ${DEBUG:-false}
      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS:-20}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-20}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
    expose:
      - "8090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8090/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - ozy_data:/app/data
      - ozy_migrations:/app/migrations
      - ozy_functions:/app/functions

volumes:
  ozy_data:
  ozy_migrations:
  ozy_functions:
