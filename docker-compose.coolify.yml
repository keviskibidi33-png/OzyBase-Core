services:
  ozybase:
    image: ${OZYBASE_IMAGE:-ozybase:local}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ozybase
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      PORT: "8090"
      SITE_URL: ${SITE_URL:?set SITE_URL}
      APP_DOMAIN: ${APP_DOMAIN:?set APP_DOMAIN}
      DEBUG: ${DEBUG:-false}
      OZY_STRICT_SECURITY: ${OZY_STRICT_SECURITY:-true}
      ANON_KEY: ${ANON_KEY:-}
      SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY:-}
      ANON_KEY_PREVIOUS: ${ANON_KEY_PREVIOUS:-}
      SERVICE_ROLE_KEY_PREVIOUS: ${SERVICE_ROLE_KEY_PREVIOUS:-}
      STATIC_KEY_GRACE_UNTIL: ${STATIC_KEY_GRACE_UNTIL:-}
      API_KEY_ROTATION_GRACE_MINUTES: ${API_KEY_ROTATION_GRACE_MINUTES:-15}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-}
      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS:-20}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-20}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
    expose:
      - "8090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8090/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - ozy_data:/app/data
      - ozy_migrations:/app/migrations
      - ozy_functions:/app/functions

volumes:
  ozy_data:
  ozy_migrations:
  ozy_functions:
